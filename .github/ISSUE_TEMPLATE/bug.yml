---
name: "Bug report"
description: "Report a bug with the Contact Energy integration"
labels: "bug"
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new issue, please [search existing issues](https://github.com/leashjay/ha-contact-energy/issues?q=is%3Aissue+label%3Abug) to see if your problem has already been reported.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have enabled debug logging and included logs below.
          required: true
        - label: This report covers a single bug (open separate issues for separate bugs).
          required: true

  - type: textarea
    attributes:
      label: System Health
      description: "Paste the output from **Settings → System → Repairs → System Information** (or the System Health card). This gives us your HA version, Python version, and OS."
    validations:
      required: true

  - type: input
    attributes:
      label: Integration version
      description: "Found in **Settings → Devices & Services → Contact Energy → ⋮ → Integration manifest**, or in HACS."
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the bug
      description: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction steps
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Debug logs
      description: |
        Enable debug logging by adding this to your `configuration.yaml`, then restart HA and reproduce the issue:
        ```yaml
        logger:
          default: warning
          logs:
            custom_components.contact_energy: debug
        ```
        Paste the relevant log lines here.
      render: text
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: "Any other details — account type (electricity / gas), plan name, screenshots, etc."
