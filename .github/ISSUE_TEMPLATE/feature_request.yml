---
name: "Feature request"
description: "Suggest an improvement or new feature for the Contact Energy integration"
labels: "enhancement"
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, please check the [existing feature requests](https://github.com/leashjay/ha-contact-energy/issues?q=is%3Aissue+label%3Aenhancement) and the [future scope](https://github.com/leashjay/ha-contact-energy#future-scope) section of the README — your idea may already be tracked.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and the README future scope, and this is not already tracked.
          required: true
        - label: This request covers a single feature (open separate issues for separate features).
          required: true

  - type: textarea
    attributes:
      label: Problem or motivation
      description: "What problem does this solve, or what would it enable?"
      placeholder: "e.g. I'd like to track off-peak dollar costs separately so I can see savings from my free hours plan."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution
      description: "Describe what you'd like to see — a new sensor, config option, dashboard card, etc."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: "Screenshots, API docs, links to similar integrations, or anything else that would help."
